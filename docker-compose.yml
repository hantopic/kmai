version: "3.8"

services:
  kmai-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kmai-backend
    restart: always
    ports:
      - "127.0.0.1:8010:8000"
    environment:
      - DATABASE_URL=postgresql://kmai_user:kmai_password@kmai-db:5432/kmai_db
    depends_on:
      - kmai-db

  kmai-db:
    image: postgres:15
    container_name: kmai-db
    restart: always
    environment:
      POSTGRES_DB: kmai_db
      POSTGRES_USER: kmai_user
      POSTGRES_PASSWORD: kmai_password
    volumes:
      - kmai_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"

volumes:
  kmai_postgres_data:
